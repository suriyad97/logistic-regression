name: titanic-logistic-regression
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Core ML
    - numpy>=1.24,<2.0
    - pandas>=2.0,<3.0
    - scikit-learn>=1.3,<2.0
    - joblib>=1.3
    - matplotlib>=3.7
    - seaborn>=0.12
    - python-dotenv>=1.0

    # Experiment tracking
    # mlflow 2.7 requires Flask<3 — Flask is NOT needed in training env
    - mlflow>=2.7,<3.0

    # Hyperparameter optimisation
    - optuna>=3.4,<4.0

    # Schema validation
    - pandera>=0.17,<0.20

    # Explainability
    - shap>=0.43,<0.46
    - lime>=0.2

    # Drift detection
    - evidently>=0.4.16,<0.5.0

    # Azure SDK
    - azure-ai-ml>=1.10
    - azure-identity>=1.13
    - azure-storage-blob>=12.17

    # Alerting (soft import)
    - opencensus-ext-azure>=1.1

    - requests>=2.31

    # NOTE: flask + gunicorn deliberately excluded from training env.
    # They are only needed in the inference serving container (Dockerfile),
    # not in the AML compute training environment.
