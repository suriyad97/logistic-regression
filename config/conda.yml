name: titanic-logistic-regression
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12        # Updated from 3.10 for better ecosystem support
  - pip
  - pip:
    # ── Core ML ──────────────────────────────────────────────────
    - numpy>=1.26,<2.0    # 1.24 lacks Python 3.12 wheels; 1.26+ required
    - pandas>=2.1,<3.0    # 2.0 has limited 3.12 support; 2.1+ recommended
    - scikit-learn>=1.4,<2.0  # 1.3 has limited 3.12 support
    - joblib>=1.3.2
    - matplotlib>=3.8      # 3.7 needs building on 3.12; 3.8+ has wheels
    - seaborn>=0.13        # Updated for 3.12 compatibility
    - python-dotenv>=1.0

    # ── Experiment tracking ───────────────────────────────────────
    # azureml-mlflow registers the azureml:// URI scheme so mlflow
    # can talk to AML's tracking store. Lightweight — no SDK chain.
    - mlflow>=2.8,<3.0     # Upgraded for better 3.12 support
    - azureml-mlflow>=1.54,<2.0

    # ── Hyperparameter optimisation ───────────────────────────────
    - optuna>=3.4,<4.0

    # ── Schema validation ─────────────────────────────────────────
    - pandera>=0.19,<0.20  # Updated from 0.17 for Python 3.12

    # ── Explainability ────────────────────────────────────────────
    - shap>=0.43,<0.46
    - lime>=0.2

    # ── Drift detection ───────────────────────────────────────────
    - evidently>=0.4.16,<0.5.0

    # ── HTTP utilities ────────────────────────────────────────────
    - requests>=2.31

    # NOTE: azure-ai-ml, azure-identity, azure-storage-blob,
    #       opencensus-ext-azure are intentionally EXCLUDED from the
    #       training environment. The Azure ML SDK has a massive
    #       OpenTelemetry/azure-monitor dependency chain that
    #       significantly slows Docker image builds and is not needed
    #       for training/inference compute jobs.
    #       These packages are only used in local scripts (scripts/)
    #       and are installed separately via requirements.txt.
