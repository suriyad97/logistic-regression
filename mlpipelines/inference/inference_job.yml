$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command

display_name: titanic-batch-inference
description: "Batch inference on unseen test data using registered model"
experiment_name: titanic-logistic-regression

compute: azureml:logistic12
environment: azureml:titanic-logistic-regression@latest

code: ../../src

inputs:
  input_data:
    type: uri_file
    path: azureml://datastores/inference_data/paths/predictions/test.csv
    mode: download
  model_dir:
    type: custom_model
    path: azureml:titanic-logistic-regression@latest
    mode: download

outputs:
  predictions:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/inference/predictions/${{name}}
    mode: rw_mount

command: >-
  python inference.py
  --model ${{inputs.model_dir}}/model.pkl
  --preprocessor ${{inputs.model_dir}}/preprocessor.pkl
  --input ${{inputs.input_data}}
  --output ${{outputs.predictions}}/predictions.csv

environment_variables:
  MLFLOW_TRACKING_URI: azureml
  MLFLOW_EXPERIMENT_NAME: titanic-logistic-regression
