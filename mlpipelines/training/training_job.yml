$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline

display_name: titanic-logistic-regression-pipeline
description: "MLOps training pipeline - 2 steps with individual logs in AML Studio"
experiment_name: titanic-logistic-regression

settings:
  default_compute: azureml:logistic12
  default_datastore: azureml:workspaceblobstore
  continue_on_step_failure: false

# Pipeline-level inputs
# Primitive values: just the value directly (no type:/default: — that is component syntax)
# Data inputs: type + path only
inputs:
  training_data:
    type: uri_file
    path: azureml://subscriptions/09d49851-6ebc-486d-a30c-7d975776628b/resourcegroups/ml-pipeline-rg/workspaces/logistic-regression-ws/datastores/logistic/paths/raw_data/titanic.csv
    mode: ro_mount
  enable_tuning: "false"
  n_trials: "50"
  test_size: "0.2"
  random_state: "42"

outputs:
  model_output:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/models/titanic/${{name}}
    mode: rw_mount

jobs:

  # ────────────────────────────────────────────────────────────────
  # STEP 1: Train
  # AML Studio -> click node -> Outputs+logs -> user_logs/std_log.txt
  # ────────────────────────────────────────────────────────────────
  train:
    type: command
    display_name: "Step 1 - Train Model"
    code: ../../src
    command: >-
      python train.py
      --data ${{inputs.training_data}}
      --output ${{outputs.model_output}}
      --test-size ${{inputs.test_size}}
      --random-state ${{inputs.random_state}}
    inputs:
      training_data: ${{parent.inputs.training_data}}
      test_size: ${{parent.inputs.test_size}}
      random_state: ${{parent.inputs.random_state}}
    outputs:
      model_output: ${{parent.outputs.model_output}}
    environment: azureml:titanic-logistic-regression@latest
    environment_variables:
      MLFLOW_TRACKING_URI: azureml
      MLFLOW_EXPERIMENT_NAME: titanic-logistic-regression
      ENABLE_TUNING: ${{parent.inputs.enable_tuning}}
      N_TRIALS: ${{parent.inputs.n_trials}}

  # ────────────────────────────────────────────────────────────────
  # STEP 2: Evaluate
  # AML Studio -> click node -> Outputs+logs -> user_logs/std_log.txt
  # ────────────────────────────────────────────────────────────────
  evaluate:
    type: command
    display_name: "Step 2 - Evaluate Model"
    code: ../../src
    command: >-
      python evaluate.py
      --model ${{inputs.model_dir}}/model.pkl
      --preprocessor ${{inputs.model_dir}}/preprocessor.pkl
      --data ${{inputs.training_data}}
      --output ${{outputs.eval_output}}
    inputs:
      model_dir: ${{parent.jobs.train.outputs.model_output}}
      training_data: ${{parent.inputs.training_data}}
    outputs:
      eval_output:
        type: uri_folder
        mode: rw_mount
    environment: azureml:titanic-logistic-regression@latest
    environment_variables:
      MLFLOW_TRACKING_URI: azureml
      MLFLOW_EXPERIMENT_NAME: titanic-logistic-regression
