$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

# ─────────────────────────────────────────────────────────────────
# Azure ML Training Job — Titanic Logistic Regression
# Triggered by: CT (ct-train-register-model.yml) AZDO pipeline
# Runs in     : DEV workspace
#
# Two modes controlled by environment variable:
#   ENABLE_TUNING=true  → Optuna hyperparameter search (50 trials)
#   ENABLE_TUNING=false → Fast training with default hyperparameters
# ─────────────────────────────────────────────────────────────────

display_name: titanic-logistic-regression-training
description: "Train logistic regression model — with optional Optuna HPO."
experiment_name: titanic-logistic-regression

compute: azureml:logistic12
environment: azureml:titanic-logistic-regression@latest

inputs:
  training_data:
    type: uri_file
    path: azureml:titanic-dataset@latest
    mode: ro_mount

outputs:
  model_output:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/models/titanic/${{name}}
    mode: rw_mount

# The ENABLE_TUNING variable is set by the CT pipeline variable group.
# Set to "true" for scheduled/drift-triggered retrains (full HPO).
# Set to "false" for quick CI validation runs.
command: >-
  python train.py
  --data ${{inputs.training_data}}
  --output ${{outputs.model_output}}
  --test-size 0.2
  --random-state 42
  $([[ "$ENABLE_TUNING" == "true" ]] && echo "--tune --n-trials $N_TRIALS" || echo "")

code: ../../src

environment_variables:
  MLFLOW_TRACKING_URI: azureml
  MLFLOW_EXPERIMENT_NAME: titanic-logistic-regression
  ENABLE_TUNING: "false"   # override in CT pipeline variable group
  N_TRIALS: "50"           # number of Optuna trials when tuning is on

resources:
  instance_type: Standard_DS3_v2
  instance_count: 1
