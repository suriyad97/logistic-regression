trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ml-pipeline-vars
- name: devRG
  value: 'ml-pipeline-rg'
- name: devWS
  value: 'logistic-regression-ws'
- name: modelName
  value: 'titanic-logistic-regression'
- name: inputDataPath
  value: 'azureml://datastores/inference_data/paths/predictions/test.csv'

# =============================================================
# CD Pipeline - Batch Inference
#
# Submits an AML command job to logistic-regression-ws that:
#   1. Downloads the registered model (model.pkl + preprocessor.pkl)
#   2. Reads test.csv from inference_data datastore
#   3. Runs inference.py -> produces predictions.csv
#   4. Saves predictions to workspaceblobstore
#
# Triggered manually or by CT pipeline completion.
# =============================================================

stages:
- stage: Inference_Dev
  displayName: 'CD - Batch Inference in DEV workspace'
  jobs:
  - job: RunBatchInference
    displayName: 'Submit inference job to logistic-regression-ws'
    timeoutInMinutes: 60
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Submit batch inference job to AML'
      name: inferenceJob
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          echo "=== Submitting batch inference job ==="
          echo "Model   : $(modelName)@latest"
          echo "Input   : $(inputDataPath)"
          echo "Workspace: $(devWS)"

          JOB_NAME=$(az ml job create \
            --file mlpipelines/inference/inference_job.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query name -o tsv)

          echo "Job submitted: $JOB_NAME"
          echo "##vso[task.setvariable variable=JOB_NAME;isOutput=true]$JOB_NAME"
          echo "##vso[task.setvariable variable=JOB_NAME]$JOB_NAME"

          echo "Streaming logs..."
          az ml job stream \
            --name $JOB_NAME \
            --resource-group $(devRG) \
            --workspace-name $(devWS)

    - task: AzureCLI@2
      displayName: 'Show predictions output location'
      condition: succeeded()
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          STATUS=$(az ml job show \
            --name $(JOB_NAME) \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query "{status:status, outputs:outputs}" -o json)

          echo "=== Inference Job Complete ==="
          echo "$STATUS"
          echo ""
          echo "Predictions saved to:"
          echo "  AML Studio -> Jobs -> $(JOB_NAME) -> Outputs+logs -> predictions/predictions.csv"
          echo ""
          echo "Datastore path:"
          echo "  azureml://datastores/workspaceblobstore/paths/inference/predictions/$(JOB_NAME)/predictions.csv"
