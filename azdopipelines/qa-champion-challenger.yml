trigger: none

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.12'
  modelName: 'titanic-logistic-regression'

stages:
- stage: QA_Validation
  displayName: 'QA: Champion vs Challenger'
  jobs:
  - job: CompareModels
    displayName: 'Compare Champion and Challenger'
    steps:
    - checkout: self

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Use Python $(pythonVersion)'

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: 'Install Dependencies'

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y
          
          # Get latest model from DEV (Challenger)
          CHALLENGER_VERSION=$(az ml model list \
            --name $(modelName) \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query "[0].version" -o tsv)
          
          echo "Challenger Model Version: $CHALLENGER_VERSION"
          echo "##vso[task.setvariable variable=CHALLENGER_VERSION]$CHALLENGER_VERSION"
          
          # Download challenger model
          az ml model download \
            --name $(modelName) \
            --version $CHALLENGER_VERSION \
            --download-path ./challenger_model \
            --resource-group $(devRG) \
            --workspace-name $(devWS)
      displayName: 'Download Challenger Model'

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y
          
          # Get champion model from QA (if exists)
          CHAMPION_VERSION=$(az ml model list \
            --name $(modelName) \
            --resource-group $(qaRG) \
            --workspace-name $(qaWS) \
            --query "[0].version" -o tsv)
          
          if [ -z "$CHAMPION_VERSION" ]; then
            echo "No champion model found. Challenger will become champion."
            echo "##vso[task.setvariable variable=IS_FIRST_MODEL]true"
          else
            echo "Champion Model Version: $CHAMPION_VERSION"
            echo "##vso[task.setvariable variable=CHAMPION_VERSION]$CHAMPION_VERSION"
            echo "##vso[task.setvariable variable=IS_FIRST_MODEL]false"
            
            # Download champion model
            az ml model download \
              --name $(modelName) \
              --version $CHAMPION_VERSION \
              --download-path ./champion_model \
              --resource-group $(qaRG) \
              --workspace-name $(qaWS)
          fi
      displayName: 'Download Champion Model'

    - script: |
        python scripts/compare_models.py \
          --challenger-model ./challenger_model \
          --champion-model ./champion_model \
          --test-data data/titanic.csv \
          --threshold 0.02 \
          --output comparison_results.json
      displayName: 'Compare Model Performance'
      condition: eq(variables['IS_FIRST_MODEL'], 'false')

    - script: |
        python scripts/compare_models.py \
          --challenger-model ./challenger_model \
          --champion-model none \
          --test-data data/titanic.csv \
          --output comparison_results.json
      displayName: 'Validate Challenger (First Model)'
      condition: eq(variables['IS_FIRST_MODEL'], 'true')

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'comparison_results.json'
        ArtifactName: 'comparison-report'
      displayName: 'Publish Comparison Report'

    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: 'Review the comparison results and approve/reject model promotion'
      displayName: 'Manual Approval Gate'

- stage: Promote_to_Prod
  displayName: 'Promote Model to PROD'
  dependsOn: QA_Validation
  condition: succeeded()
  jobs:
  - job: PromoteModel
    displayName: 'Promote Champion to PROD'
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y
          
          # Copy champion model from QA to PROD
          az ml model create \
            --name $(modelName) \
            --path "azureml://subscriptions/$(AZURE_SUBSCRIPTION_ID)/resourceGroups/$(qaRG)/providers/Microsoft.MachineLearningServices/workspaces/$(qaWS)/models/$(modelName)/versions/$(CHAMPION_VERSION)" \
            --type "custom_model" \
            --resource-group $(prodRG) \
            --workspace-name $(prodWS) \
            --set tags.promoted_from=qa \
            --set tags.promotion_date=$(date +%Y-%m-%d)
      displayName: 'Register Model in PROD'
