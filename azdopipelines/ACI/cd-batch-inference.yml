parameters:
- name: modelVersion
  displayName: 'Model Version to Deploy'
  type: string
  default: 2

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ml-pipeline-vars
- name: devRG
  value: 'ml-pipeline-rg'
- name: devWS
  value: 'logistic-regression-ws'
- name: modelName
  value: 'titanic-logistic-regression'
- name: SHARE_NAME
  value: 'modelshare-batch'

# =============================================================
# CD Pipeline - Batch Inference (Azure Container Instances)
#
# Runs batch inference on raw Azure infrastructure by spinning up
# a temporary container, running inference, and terminating it.
# =============================================================

stages:
- stage: Run_Batch_ACI
  displayName: 'Run Batch Inference in ACI'
  jobs:
  - job: RunBatchACI
    displayName: 'Deploy ACI Batch Job'
    timeoutInMinutes: 60
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Provision ACI and Run Inference'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          echo "=== Fetching Storage Keys ==="
          STORAGE_ACCOUNT=$(az ml workspace show -n $(devWS) -g $(devRG) --query storage_account -o tsv | awk -F'/' '{print $8}')
          STORAGE_KEY=$(az storage account keys list -g $(devRG) -n $STORAGE_ACCOUNT --query "[0].value" -o tsv)

          echo "=== Creating File Share for Model & Data ==="
          az storage share-rm create --resource-group $(devRG) \
            --storage-account $STORAGE_ACCOUNT --name $SHARE_NAME \
            --quota 10

          echo "=== Downloading Model ==="
          az ml model download --name $(modelName) --version ${{ parameters.modelVersion }} \
            --resource-group $(devRG) --workspace-name $(devWS) --download-path ./downloaded_model
          
          MODEL_DIR=$(dirname $(find ./downloaded_model -name "model.pkl" | head -n 1))
          az storage file upload-batch \
            --destination $SHARE_NAME \
            --source $MODEL_DIR \
            --account-name $STORAGE_ACCOUNT --account-key $STORAGE_KEY

          echo "=== Fetching Latest Image ==="
          ACR_NAME=$(az ml workspace show -n $(devWS) -g $(devRG) --query container_registry -o tsv | awk -F'/' '{print $8}')
          ACR_LOGIN_SERVER=$(az acr show -n $ACR_NAME --query loginServer -o tsv)
          LATEST_TAG=$(az acr repository show-tags -n $ACR_NAME --repository titanic-logistic-regression --orderby time_desc --top 1 -o tsv)
          IMAGE="$ACR_LOGIN_SERVER/titanic-logistic-regression:$LATEST_TAG"

          ACR_PASSWORD=$(az acr credential show -n $ACR_NAME --query "passwords[0].value" -o tsv)

          echo "=== Spinning up ACI for Batch Run ==="
          # Use RestartPolicy=Never to terminate after the script completes
          az container create \
            --resource-group $(devRG) \
            --name titanic-batch-aci \
            --image $IMAGE \
            --registry-login-server $ACR_LOGIN_SERVER \
            --registry-username $ACR_NAME \
            --registry-password $ACR_PASSWORD \
            --os-type Linux --cpu 1 --memory 2.0 \
            --azure-file-volume-account-name $STORAGE_ACCOUNT \
            --azure-file-volume-account-key $STORAGE_KEY \
            --azure-file-volume-share-name $SHARE_NAME \
            --azure-file-volume-mount-path /mnt/share \
            --restart-policy Never \
            --command-line "python src/inference.py --model /mnt/share/model.pkl --preprocessor /mnt/share/preprocessor.pkl --input /mnt/share/test.csv --output /mnt/share/predictions.csv"

          echo "Waiting for batch inference to complete..."
          # Poll until termination
          while true; do
            STATE=$(az container show -g $(devRG) -n titanic-batch-aci --query "containers[0].instanceView.currentState.state" -o tsv)
            if [ "$STATE" == "Terminated" ]; then
              break
            fi
            echo "Current state: $STATE. Sleeping 10s..."
            sleep 10
          done

          echo "Batch job complete! Check the storage share '$SHARE_NAME' for predictions.csv."
