parameters:
- name: modelVersion
  displayName: 'Model Version to Deploy'
  type: string
  default: 2

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ml-pipeline-vars
- name: devRG
  value: 'ml-pipeline-rg'
- name: devWS
  value: 'logistic-regression-ws'
- name: modelName
  value: 'titanic-logistic-regression'

# =============================================================
# CD Pipeline - Real-Time Inference (Azure ML Managed Online Endpoint)
#
# Deploys a robust, auto-scaling real-time REST endpoint using 
# Azure ML Managed Online Endpoints with our custom Docker container.
# =============================================================

stages:
- stage: Deploy_RealTime_API
  displayName: 'Deploy Real-Time API to Azure ML'
  jobs:
  - job: DeployManagedEndpoint
    displayName: 'Deploy to Managed Online Endpoint'
    timeoutInMinutes: 60
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Deploy to Azure ML Managed Online Endpoint'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          
          echo "=== Installing Azure ML CLI ==="
          az extension add -n ml -y --allow-preview true

          echo "=== Creating Managed Online Endpoint ==="
          # Creates the endpoint if it doesn't exist, updates if it does
          az ml online-endpoint create \
            --file mlpipelines/inference/online_endpoint.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS)

          echo "=== Deploying Model to Endpoint ==="
          # Create a new deployment and route 100% of traffic to it.
          # We dynamically inject the selected modelVersion.
          az ml online-deployment create \
            --file mlpipelines/inference/online_deployment.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --set model=azureml:$(modelName):${{ parameters.modelVersion }} \
            --all-traffic

          echo "Deployment successful!"
          
          # Fetch the scoring URI dynamically
          SCORING_URI=$(az ml online-endpoint show -n titanic-realtime-endpoint -g $(devRG) -w $(devWS) --query scoring_uri -o tsv)
          
          echo "Your Production-Ready Endpoint is Live at:"
          echo "$SCORING_URI"
