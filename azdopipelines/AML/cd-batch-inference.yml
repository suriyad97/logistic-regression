parameters:
- name: modelVersion
  displayName: 'Model Version to Deploy'
  type: string
  default: 2

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ml-pipeline-vars
- name: devRG
  value: 'ml-pipeline-rg'
- name: devWS
  value: 'logistic-regression-ws'
- name: modelName
  value: 'titanic-logistic-regression'
- name: inputDataFile
  value: 'data/inference/test.csv'

# =============================================================
# CD Pipeline - Batch Inference (Azure ML Managed Batch Endpoint)
#
# Deploys a massive-scale Managed Batch Endpoint, allowing asynchronous
# processing of terabytes of data.
# =============================================================

stages:
- stage: Deploy_Batch_Endpoint
  displayName: 'Deploy Batch Endpoint to Azure ML'
  jobs:
  - job: DeployBatch
    displayName: 'Deploy to Managed Batch Endpoint'
    timeoutInMinutes: 60
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Deploy to Azure ML Managed Batch Endpoint'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          echo "=== Creating Managed Batch Endpoint ==="
          az ml batch-endpoint create \
            --file mlpipelines/inference/batch_endpoint.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS)

          echo "=== Deploying Model to Batch Endpoint ==="
          az ml batch-deployment create \
            --file mlpipelines/inference/batch_deployment.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --set model=azureml:$(modelName):${{ parameters.modelVersion }} \
            --set-default

          echo "Deployment successful!"

          echo "=== Registering Data Asset for Batch Invoke ==="
          # Use the local CSV file from the checked-out repo as the input path.
          # This avoids the Azure CLI 'Tenant mismatch' bug that occurs when resolving
          # azureml:// datastore URIs under Workload Identity Federation tokens.
          DATA_VERSION=$(date +%s)
          VERSION=$(az ml data create \
            --name batch-test-data \
            --path $(inputDataFile) \
            --type uri_file \
            --version $DATA_VERSION \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query version -o tsv)

          echo "=== Testing Batch Endpoint ==="
          JOB_NAME=$(az ml batch-endpoint invoke \
            --name titanic-batch-endpoint \
            --input azureml:batch-test-data:$VERSION \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query name -o tsv)

          echo "Batch Inference Job submitted: $JOB_NAME"
          echo "##vso[task.setvariable variable=JOB_NAME]$JOB_NAME"
          
          echo "Streaming logs..."
          az ml job stream \
            --name $JOB_NAME \
            --resource-group $(devRG) \
            --workspace-name $(devWS)
