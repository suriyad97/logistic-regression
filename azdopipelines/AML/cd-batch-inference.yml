parameters:
- name: modelVersion
  displayName: 'Model Version to Deploy'
  type: string
  default: 2

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ml-pipeline-vars
- name: devRG
  value: 'ml-pipeline-rg'
- name: devWS
  value: 'logistic-regression-ws'
- name: modelName
  value: 'titanic-logistic-regression'
- name: inputDataFile
  value: 'data/inference/test.csv'

# =============================================================
# CD Pipeline - Batch Inference (Azure ML Managed Batch Endpoint)
#
# Deploys a massive-scale Managed Batch Endpoint, allowing asynchronous
# processing of terabytes of data.
# =============================================================

stages:
- stage: Deploy_Batch_Endpoint
  displayName: 'Deploy Batch Endpoint to Azure ML'
  jobs:
  - job: DeployBatch
    displayName: 'Deploy to Managed Batch Endpoint'
    timeoutInMinutes: 60
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Deploy to Azure ML Managed Batch Endpoint'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          echo "=== Ensuring Managed Batch Endpoint Exists ==="
          # Idempotent: only create the endpoint if it does not already exist.
          if ! az ml batch-endpoint show \
              --name titanic-batch-endpoint \
              --resource-group $(devRG) \
              --workspace-name $(devWS) > /dev/null 2>&1; then
            echo "Endpoint not found. Creating..."
            az ml batch-endpoint create \
              --file mlpipelines/inference/batch_endpoint.yml \
              --resource-group $(devRG) \
              --workspace-name $(devWS)
          else
            echo "Endpoint already exists. Skipping creation."
          fi

          echo "=== Deploying Model to Batch Endpoint ==="
          # Idempotent: use 'create' on first deploy, 'update' on subsequent deploys.
          # az ml batch-deployment create throws RequestInvalid when overwriting an existing
          # deployment at the REST API level, even though the docs say it overwrites.
          if az ml batch-deployment show \
              --name main \
              --endpoint-name titanic-batch-endpoint \
              --resource-group $(devRG) \
              --workspace-name $(devWS) > /dev/null 2>&1; then
            echo "Deployment exists. Updating model to version ${{ parameters.modelVersion }}..."
            az ml batch-deployment update \
              --name main \
              --endpoint-name titanic-batch-endpoint \
              --resource-group $(devRG) \
              --workspace-name $(devWS) \
              --set model=azureml:$(modelName):${{ parameters.modelVersion }}
          else
            echo "Deployment not found. Creating fresh..."
            az ml batch-deployment create \
              --file mlpipelines/inference/batch_deployment.yml \
              --resource-group $(devRG) \
              --workspace-name $(devWS) \
              --set model=azureml:$(modelName):${{ parameters.modelVersion }} \
              --set-default
          fi

          echo "Deployment successful!"
          echo "Batch endpoint 'titanic-batch-endpoint' is live and ready to accept invocations."

