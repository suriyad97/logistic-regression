trigger:
  branches:
    include:
    - master
  paths:
    include:
    - requirements.txt
    - config/environment.yml
    - config/conda.yml
    - azdopipelines/ci-setup-environment.yml

pr:
  branches:
    include:
    - master
  paths:
    include:
    - requirements.txt
    - config/environment.yml
    - config/conda.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ml-pipeline-vars
- name: environmentName
  value: 'titanic-logistic-regression'
- name: devRG
  value: 'ml-pipeline-rg'
- name: devWS
  value: 'logistic-regression-ws'
- name: qaRG
  value: 'ml-pipeline-rg-qa'
- name: qaWS
  value: 'logistic-regression-qa'
- name: prodRG
  value: 'ml-pipeline-rg-prod'
- name: prodWS
  value: 'logistic-regression-prod'

# ═══════════════════════════════════════════════════════════════════
# CI Pipeline — Environment Setup
#
# Runs entirely on the FREE Azure DevOps Ubuntu agent.
# NO AML compute cluster is used here.
#
# Stage ① : Lint — YAML parse + Python syntax              (~1 min)
# Stage ② : Package check — conda.yml packages installed
#            on the AzDO agent and imports validated        (~3 min)
# Stage ③ : DEV — Register environment spec in AML         (~1 min)
# Stage ④ : QA  — Manual approval → propagate to QA WS
# Stage ⑤ : PROD — Manual approval → propagate to PROD WS
#
# The AML Docker image is built lazily by AML the first time
# the CT training job runs — CI does NOT need to wait for it.
# ═══════════════════════════════════════════════════════════════════

stages:

# ──────────────────────────────────────────────────────────────────
# STAGE 1: Lint & validate (AzDO agent — free)
# ──────────────────────────────────────────────────────────────────
- stage: Validate
  displayName: '① Validate — Lint & Schema Check'
  jobs:
  - job: LintAndValidate
    displayName: 'YAML parse + Python syntax check'
    steps:
    - checkout: self

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.10'
      displayName: 'Use Python 3.10'

    - script: |
        pip install pyyaml --quiet
        echo "=== Checking all YAML files parse cleanly ==="
        python -c "
        import yaml, glob, sys
        files = glob.glob('**/*.yml', recursive=True)
        errors = []
        for f in files:
            try:
                yaml.safe_load(open(f))
                print(f'  OK  {f}')
            except Exception as e:
                errors.append(f'  FAIL {f}: {e}')
        if errors:
            print('\n'.join(errors))
            sys.exit(1)
        print(f'All {len(files)} YAML files valid')
        "
        echo "=== Checking Python syntax ==="
        python -m py_compile src/train.py src/data_processing.py src/inference.py src/schema.py src/explain.py
        echo "All syntax checks passed"
      displayName: 'YAML + Python syntax check'

# ──────────────────────────────────────────────────────────────────
# STAGE 2: Package install check (AzDO agent — free, ~3 min)
# ──────────────────────────────────────────────────────────────────
# PURPOSE: Verify that the packages in config/conda.yml actually
# install and import correctly BEFORE registering in AML.
# This catches dependency conflicts early without burning compute.
# The AML Docker image is built separately when the CT job first runs.
# ──────────────────────────────────────────────────────────────────
- stage: PackageCheck
  displayName: '② Package Check — Install & Import on AzDO Agent'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: ValidatePackages
    displayName: 'Install conda.yml packages on AzDO agent + verify imports'
    timeoutInMinutes: 15
    steps:
    - checkout: self

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.10'
      displayName: 'Use Python 3.10'

    - script: |
        set -e

        echo "=== Extracting pip packages from config/conda.yml ==="
        python - << 'PYEOF'
import yaml, sys

with open('config/conda.yml') as f:
    conda = yaml.safe_load(f)

pip_packages = []
for dep in conda.get('dependencies', []):
    if isinstance(dep, dict) and 'pip' in dep:
        for pkg in dep['pip']:
            stripped = pkg.strip()
            if stripped and not stripped.startswith('#'):
                pip_packages.append(stripped)

print(f'Found {len(pip_packages)} pip packages:')
for p in pip_packages:
    print(f'  {p}')

with open('/tmp/ci_requirements.txt', 'w') as f:
    f.write('\n'.join(pip_packages))
PYEOF

        echo ""
        echo "=== Installing packages on AzDO agent (same as AML Docker build) ==="
        pip install -r /tmp/ci_requirements.txt

        echo ""
        echo "=== Verifying all key package imports ==="
        python - << 'PYEOF'
import importlib, sys

packages = {
    'numpy':     'numpy',
    'pandas':    'pandas',
    'sklearn':   'scikit-learn',
    'mlflow':    'mlflow',
    'optuna':    'optuna',
    'pandera':   'pandera',
    'shap':      'shap',
    'lime':      'lime',
    'evidently': 'evidently',
}

failed = []
for module, pkg in packages.items():
    try:
        importlib.import_module(module)
        print(f'  OK  {pkg}')
    except ImportError as e:
        failed.append(f'  FAIL {pkg}: {e}')

if failed:
    print('\nFailed imports:')
    print('\n'.join(failed))
    sys.exit(1)

print(f'\nAll {len(packages)} packages imported successfully')
print('conda.yml is valid and safe to register in AML')
PYEOF

        echo ""
        echo "=== Installed versions ==="
        pip list | grep -iE "numpy|pandas|scikit|mlflow|optuna|pandera|shap|lime|evidently"

        echo ""
        echo "=== Dependency conflict check ==="
        pip check && echo "No conflicts found" || echo "Warning: conflicts detected (see above)"
      displayName: 'Install conda.yml packages + verify imports (single shell)'



# ──────────────────────────────────────────────────────────────────
# STAGE 3: DEV — register environment spec in AML
# (AzDO agent calls az ml — no compute cluster used)
# ──────────────────────────────────────────────────────────────────
- stage: CI_Dev
  displayName: '③ DEV — Register Environment in AML'
  dependsOn: PackageCheck
  condition: succeeded()
  jobs:
  - job: RegisterEnvDev
    displayName: 'Register environment spec in logistic-regression-ws'
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'az ml environment create (DEV)'
      name: createEnvDev
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y --allow-preview true

          echo "=== Registering environment spec in DEV workspace ==="
          ENV_VERSION=$(az ml environment create \
            --file config/environment.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query version -o tsv)

          echo "Environment registered: $(environmentName) v$ENV_VERSION"
          echo "AML will build the Docker image lazily when the CT training job runs."
          echo "##vso[task.setvariable variable=ENV_VERSION;isOutput=true]$ENV_VERSION"

          # Confirm it's registered
          az ml environment show \
            --name $(environmentName) \
            --label latest \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query "{name:name, version:version}" -o table

    - script: |
        echo "Environment version: $(createEnvDev.ENV_VERSION)" > env_version.txt
      displayName: 'Record environment version'

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: 'env_version.txt'
        artifact: 'environment-version'
      displayName: 'Publish env version for CT pipeline'

# ──────────────────────────────────────────────────────────────────
# STAGE 4: QA — manual gate → propagate
# ──────────────────────────────────────────────────────────────────
- stage: CI_QA
  displayName: '④ QA — Propagate Environment'
  dependsOn: CI_Dev
  condition: succeeded()
  jobs:
  - job: ApprovalGate_QA
    displayName: 'Manual Approval: DEV → QA'
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: |
          CI package check passed on AzDO agent.
          Environment "$(environmentName)" registered in logistic-regression-ws.
          Approve to propagate the same spec to logistic-regression-qa.
        onTimeout: 'reject'
        timeout: '1440'

  - job: RegisterEnvQA
    displayName: 'Register environment in logistic-regression-qa'
    dependsOn: ApprovalGate_QA
    condition: succeeded()
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'az ml environment create (QA)'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y --allow-preview true
          az ml environment create \
            --file config/environment.yml \
            --resource-group $(qaRG) \
            --workspace-name $(qaWS)
          az ml environment show \
            --name $(environmentName) --label latest \
            --resource-group $(qaRG) --workspace-name $(qaWS) \
            --query "{name:name, version:version}" -o table
          echo "Environment registered in QA"

# ──────────────────────────────────────────────────────────────────
# STAGE 5: PROD — manual gate → propagate
# ──────────────────────────────────────────────────────────────────
- stage: CI_Prod
  displayName: '⑤ PROD — Propagate Environment'
  dependsOn: CI_QA
  condition: succeeded()
  jobs:
  - job: ApprovalGate_Prod
    displayName: 'Manual Approval: QA → PROD'
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: |
          QA environment validated. Approve to propagate to logistic-regression-prod.
          WARNING: affects all PROD inference and monitoring jobs.
        onTimeout: 'reject'
        timeout: '1440'

  - job: RegisterEnvProd
    displayName: 'Register environment in logistic-regression-prod'
    dependsOn: ApprovalGate_Prod
    condition: succeeded()
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'az ml environment create (PROD)'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y --allow-preview true
          az ml environment create \
            --file config/environment.yml \
            --resource-group $(prodRG) \
            --workspace-name $(prodWS)
          az ml environment show \
            --name $(environmentName) --label latest \
            --resource-group $(prodRG) --workspace-name $(prodWS) \
            --query "{name:name, version:version}" -o table

          python -c "
          import json, datetime
          print(json.dumps({
            'propagated_at': datetime.datetime.utcnow().isoformat(),
            'environment': '$(environmentName)',
            'pipeline_build': '$(Build.BuildNumber)',
            'git_commit': '$(Build.SourceVersion)'
          }, indent=2))
          " > env_propagation_record.json

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'env_propagation_record.json'
        ArtifactName: 'env-propagation-audit'
      condition: always()
