trigger:
  branches:
    include:
    - master
  paths:
    include:
    - requirements.txt
    - config/environment.yml
    - config/conda.yml
    - azdopipelines/ci-setup-environment.yml
    - scripts/ci/

pr:
  branches:
    include:
    - master
  paths:
    include:
    - requirements.txt
    - config/environment.yml
    - config/conda.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ml-pipeline-vars
- name: environmentName
  value: 'titanic-logistic-regression'
- name: devRG
  value: 'ml-pipeline-rg'
- name: devWS
  value: 'logistic-regression-ws'
- name: qaRG
  value: 'ml-pipeline-rg-qa'
- name: qaWS
  value: 'logistic-regression-qa'
- name: prodRG
  value: 'ml-pipeline-rg-prod'
- name: prodWS
  value: 'logistic-regression-prod'

stages:

# Stage 1: Lint - YAML parse and Python syntax check
- stage: Validate
  displayName: 'Stage 1 - Lint and Schema Check'
  jobs:
  - job: LintAndValidate
    displayName: 'YAML and Python syntax check'
    steps:
    - checkout: self
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.10'
      displayName: 'Use Python 3.10'
    - script: |
        set -e
        pip install pyyaml --quiet
        python scripts/ci/check_yaml.py
        python -m py_compile src/train.py src/data_processing.py src/inference.py src/schema.py src/explain.py
        echo "All syntax checks passed"
      displayName: 'Run YAML lint and Python syntax check'

# Stage 2: Package check - runs on AzDO agent (free, ~5 min)
# Validates conda.yml packages install and import correctly.
# No AML compute used. Docker image built lazily by CT pipeline.
- stage: PackageCheck
  displayName: 'Stage 2 - Package Install and Import Check'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: ValidatePackages
    displayName: 'pip install conda.yml and verify imports on AzDO agent'
    timeoutInMinutes: 15
    steps:
    - checkout: self
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.10'
      displayName: 'Use Python 3.10'
    - script: |
        set -e
        pip install pyyaml --quiet
        python scripts/ci/check_packages.py
      displayName: 'Install conda.yml packages and verify all imports'

# Stage 3: Register environment spec in DEV AML workspace
# (AzDO agent only - no compute cluster)
- stage: CI_Dev
  displayName: 'Stage 3 - DEV Register Environment'
  dependsOn: PackageCheck
  condition: succeeded()
  jobs:
  - job: RegisterEnvDev
    displayName: 'Register environment in logistic-regression-ws'
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'az ml environment create DEV'
      name: createEnvDev
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          ENV_VERSION=$(az ml environment create \
            --file config/environment.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query version -o tsv)

          echo "Registered: $(environmentName) version $ENV_VERSION"
          echo "##vso[task.setvariable variable=ENV_VERSION;isOutput=true]$ENV_VERSION"

          az ml environment show \
            --name $(environmentName) \
            --label latest \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query "{name:name, version:version}" -o table

    - script: echo "Environment version $(createEnvDev.ENV_VERSION)" > env_version.txt
      displayName: 'Save environment version'

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: 'env_version.txt'
        artifact: 'environment-version'
      displayName: 'Publish env version for CT pipeline'

# Stage 4: Manual approval then propagate to QA
- stage: CI_QA
  displayName: 'Stage 4 - QA Propagate Environment'
  dependsOn: CI_Dev
  condition: succeeded()
  jobs:
  - job: ApprovalGate_QA
    displayName: 'Manual Approval DEV to QA'
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: 'Package check passed. Approve to propagate environment to logistic-regression-qa.'
        onTimeout: 'reject'
        timeout: '1440'

  - job: RegisterEnvQA
    displayName: 'Register environment in logistic-regression-qa'
    dependsOn: ApprovalGate_QA
    condition: succeeded()
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'az ml environment create QA'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true
          az ml environment create \
            --file config/environment.yml \
            --resource-group $(qaRG) \
            --workspace-name $(qaWS)
          az ml environment show \
            --name $(environmentName) --label latest \
            --resource-group $(qaRG) --workspace-name $(qaWS) \
            --query "{name:name, version:version}" -o table

# Stage 5: Manual approval then propagate to PROD
- stage: CI_Prod
  displayName: 'Stage 5 - PROD Propagate Environment'
  dependsOn: CI_QA
  condition: succeeded()
  jobs:
  - job: ApprovalGate_Prod
    displayName: 'Manual Approval QA to PROD'
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: 'QA validated. Approve to propagate environment to logistic-regression-prod. WARNING: affects all PROD jobs.'
        onTimeout: 'reject'
        timeout: '1440'

  - job: RegisterEnvProd
    displayName: 'Register environment in logistic-regression-prod'
    dependsOn: ApprovalGate_Prod
    condition: succeeded()
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'az ml environment create PROD'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true
          az ml environment create \
            --file config/environment.yml \
            --resource-group $(prodRG) \
            --workspace-name $(prodWS)
          az ml environment show \
            --name $(environmentName) --label latest \
            --resource-group $(prodRG) --workspace-name $(prodWS) \
            --query "{name:name, version:version}" -o table
