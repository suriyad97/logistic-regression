trigger:
  branches:
    include:
    - main
  paths:
    include:
    - requirements.txt
    - config/environment.yml
    - azdopipelines/ci-setup-environment.yml

pr:
  branches:
    include:
    - main
  paths:
    include:
    - requirements.txt
    - config/environment.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.12'
  environmentName: 'titanic-logistic-regression'

# ═══════════════════════════════════════════════════════════════════
# HOW ENVIRONMENT PROMOTION WORKS
# ───────────────────────────────
# Azure ML environments are NOT "moved" between workspaces.
# They are RECREATED from the same config/environment.yml definition
# in each workspace. This guarantees:
#   ① Identical Python packages across DEV / QA / PROD
#   ② AML auto-increments the version in each workspace's registry
#   ③ Any training or inference job can reference @latest and get
#      the same image regardless of which workspace it runs in
#
# Promotion flow:
#   DEV   → validate the image actually builds (AML builds Docker image)
#   QA    → gated by ManualValidation — propagate only after DEV builds OK
#   PROD  → gated by ManualValidation — propagate only after QA champion
#           has been approved (env must exist in PROD before CD can run)
# ═══════════════════════════════════════════════════════════════════

stages:

# ──────────────────────────────────────────────────────────────────
# STAGE 1: DEV — create/update the environment and wait for it to build
# ──────────────────────────────────────────────────────────────────
- stage: CI_Dev
  displayName: 'CI ① DEV — Create ML Environment'
  jobs:
  - job: CreateEnvDev
    displayName: 'Create Environment in DEV workspace'
    steps:
    - checkout: self

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Use Python $(pythonVersion)'

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y

          echo "Creating/updating environment in DEV workspace..."
          ENV_VERSION=$(az ml environment create \
            --file config/environment.yml \
            --resource-group $(AZURE_RESOURCE_GROUP)-dev \
            --workspace-name $(AZURE_ML_WORKSPACE)-dev \
            --name $(environmentName) \
            --query version -o tsv)

          echo "Environment version: $ENV_VERSION"
          echo "##vso[task.setvariable variable=ENV_VERSION;isOutput=true]$ENV_VERSION"
      displayName: 'Create Environment in DEV'
      name: createEnvDev
      env:
        AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
        AZURE_RESOURCE_GROUP: $(AZURE_RESOURCE_GROUP)
        AZURE_ML_WORKSPACE: $(AZURE_ML_WORKSPACE)

    # Wait for AML to finish building the Docker image for this environment.
    # This can take 5–15 minutes on first build; subsequent runs are cached.
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y

          ENV_VERSION=$(createEnvDev.ENV_VERSION)
          echo "Waiting for environment $ENV_VERSION to finish building..."

          # Poll build status (max 20 minutes)
          for i in $(seq 1 40); do
            STATUS=$(az ml environment show \
              --name $(environmentName) \
              --version $ENV_VERSION \
              --resource-group $(AZURE_RESOURCE_GROUP)-dev \
              --workspace-name $(AZURE_ML_WORKSPACE)-dev \
              --query "stage" -o tsv 2>/dev/null || echo "Pending")

            echo "  [$i/40] Build status: $STATUS"

            if [ "$STATUS" == "Succeeded" ]; then
              echo "✅ Environment build succeeded"
              exit 0
            elif [ "$STATUS" == "Failed" ]; then
              echo "❌ Environment build FAILED"
              exit 1
            fi
            sleep 30
          done

          echo "⚠️  Timed out waiting for environment build (20 min)"
          exit 1
      displayName: 'Wait for Environment Build (DEV)'

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y

          # Verify the environment exists and is listed
          RESULT=$(az ml environment list \
            --name $(environmentName) \
            --resource-group $(AZURE_RESOURCE_GROUP)-dev \
            --workspace-name $(AZURE_ML_WORKSPACE)-dev \
            --query "[0].{name:name, version:version, stage:stage}" -o json)

          echo "DEV Environment: $RESULT"
      displayName: 'Validate Environment in DEV'


# ──────────────────────────────────────────────────────────────────
# STAGE 2: QA — propagate the same environment definition to QA
#          Gated by manual approval so ML lead can review DEV build
# ──────────────────────────────────────────────────────────────────
- stage: CI_QA
  displayName: 'CI ② QA — Propagate Environment'
  dependsOn: CI_Dev
  condition: succeeded()
  jobs:

  # Manual gate: ML lead verifies DEV environment built cleanly
  - job: ApprovalGate_QA
    displayName: 'Approval: Propagate env DEV → QA'
    pool: server    # agentless job — required for ManualValidation
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: |
          DEV environment "$(environmentName)" built successfully.
          Review the environment in AML Studio DEV workspace, then approve
          to propagate the same definition to the QA workspace.
        onTimeout: 'reject'
        timeout: '1440'   # 24 hours to approve
      displayName: 'Manual Approval — DEV → QA'

  - job: CreateEnvQA
    displayName: 'Create Environment in QA workspace'
    dependsOn: ApprovalGate_QA
    condition: succeeded()
    steps:
    - checkout: self

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y

          echo "Propagating environment to QA workspace..."
          az ml environment create \
            --file config/environment.yml \
            --resource-group $(AZURE_RESOURCE_GROUP)-qa \
            --workspace-name $(AZURE_ML_WORKSPACE)-qa \
            --name $(environmentName)

          echo "✅ Environment created in QA"
      displayName: 'Create Environment in QA'
      env:
        AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
        AZURE_RESOURCE_GROUP: $(AZURE_RESOURCE_GROUP)
        AZURE_ML_WORKSPACE: $(AZURE_ML_WORKSPACE)

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y

          RESULT=$(az ml environment list \
            --name $(environmentName) \
            --resource-group $(AZURE_RESOURCE_GROUP)-qa \
            --workspace-name $(AZURE_ML_WORKSPACE)-qa \
            --query "[0].{name:name, version:version}" -o json)

          echo "QA Environment: $RESULT"
      displayName: 'Validate Environment in QA'


# ──────────────────────────────────────────────────────────────────
# STAGE 3: PROD — propagate to PROD only after QA has been validated
#          This must complete BEFORE the CD inference pipeline runs.
#          Typically triggered after a successful QA champion approval.
# ──────────────────────────────────────────────────────────────────
- stage: CI_Prod
  displayName: 'CI ③ PROD — Propagate Environment'
  dependsOn: CI_QA
  condition: succeeded()
  jobs:

  - job: ApprovalGate_Prod
    displayName: 'Approval: Propagate env QA → PROD'
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: |
          QA environment "$(environmentName)" is validated.
          Approve to propagate the same environment to the PROD workspace.
          WARNING: This will affect all future PROD inference and monitoring jobs.
        onTimeout: 'reject'
        timeout: '1440'
      displayName: 'Manual Approval — QA → PROD'

  - job: CreateEnvProd
    displayName: 'Create Environment in PROD workspace'
    dependsOn: ApprovalGate_Prod
    condition: succeeded()
    steps:
    - checkout: self

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y

          echo "Propagating environment to PROD workspace..."
          az ml environment create \
            --file config/environment.yml \
            --resource-group $(AZURE_RESOURCE_GROUP)-prod \
            --workspace-name $(AZURE_ML_WORKSPACE)-prod \
            --name $(environmentName)

          echo "✅ Environment created in PROD"
      displayName: 'Create Environment in PROD'
      env:
        AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
        AZURE_RESOURCE_GROUP: $(AZURE_RESOURCE_GROUP)
        AZURE_ML_WORKSPACE: $(AZURE_ML_WORKSPACE)

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y

          RESULT=$(az ml environment list \
            --name $(environmentName) \
            --resource-group $(AZURE_RESOURCE_GROUP)-prod \
            --workspace-name $(AZURE_ML_WORKSPACE)-prod \
            --query "[0].{name:name, version:version}" -o json)

          echo "PROD Environment: $RESULT"

          # Write a propagation record for audit trail
          python -c "
          import json, datetime
          record = {
            'propagated_at': datetime.datetime.utcnow().isoformat(),
            'environment': '$(environmentName)',
            'source': 'qa',
            'destination': 'prod',
            'pipeline_build': '$(Build.BuildNumber)',
            'git_commit': '$(Build.SourceVersion)'
          }
          print(json.dumps(record, indent=2))
          " > env_propagation_record.json
          cat env_propagation_record.json
      displayName: 'Validate Environment in PROD + Write Audit Record'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'env_propagation_record.json'
        ArtifactName: 'env-propagation-audit'
      displayName: 'Publish Propagation Audit Record'
      condition: always()
