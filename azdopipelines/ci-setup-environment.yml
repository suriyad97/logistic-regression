trigger:
  branches:
    include:
    - master
  paths:
    include:
    - requirements.txt
    - config/environment.yml
    - config/conda.yml
    - azdopipelines/ci-setup-environment.yml

pr:
  branches:
    include:
    - master
  paths:
    include:
    - requirements.txt
    - config/environment.yml
    - config/conda.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ml-pipeline-vars
- name: environmentName
  value: 'titanic-logistic-regression'
- name: devRG
  value: 'ml-pipeline-rg'
- name: devWS
  value: 'logistic-regression-ws'
- name: qaRG
  value: 'ml-pipeline-rg-qa'
- name: qaWS
  value: 'logistic-regression-qa'
- name: prodRG
  value: 'ml-pipeline-rg-prod'
- name: prodWS
  value: 'logistic-regression-prod'

stages:

# ──────────────────────────────────────────────────────────────────
# STAGE 1: Lint & validate
# ──────────────────────────────────────────────────────────────────
- stage: Validate
  displayName: '① Validate — Lint & Schema Check'
  jobs:
  - job: LintAndValidate
    steps:
    - checkout: self
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.10'
    - script: |
        pip install pyyaml
        python -c "
        import yaml, glob, sys
        files = glob.glob('**/*.yml', recursive=True)
        errors = []
        for f in files:
            try:
                yaml.safe_load(open(f)); print(f'  OK {f}')
            except Exception as e:
                errors.append(f'  FAIL {f}: {e}')
        if errors: print('\n'.join(errors)); sys.exit(1)
        "
        python -m py_compile src/train.py src/data_processing.py src/inference.py src/schema.py
        echo "All syntax checks passed"
      displayName: 'YAML + Python syntax check'

# ──────────────────────────────────────────────────────────────────
# STAGE 2: DEV — create environment
# ──────────────────────────────────────────────────────────────────
- stage: CI_Dev
  displayName: '② DEV — Create Environment'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: CreateEnvDev
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'Create environment in DEV (logistic-regression-ws)'
      name: createEnvDev
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y --allow-preview true

          ENV_VERSION=$(az ml environment create \
            --file config/environment.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query version -o tsv)

          echo "DEV Environment version: $ENV_VERSION"
          echo "##vso[task.setvariable variable=ENV_VERSION;isOutput=true]$ENV_VERSION"

    - task: AzureCLI@2
      displayName: 'Trigger + wait for Docker image build via smoke-test job'
      timeoutInMinutes: 30
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y --allow-preview true

          # AML builds Docker images lazily — the image is built when a job
          # first uses the environment. Submit a minimal smoke-test job
          # (just "python --version") to force the image build, then poll
          # the job status. When the job succeeds/fails, the image is built.

          echo "=== Submitting smoke-test job to trigger Docker image build ==="
          JOB_NAME=$(az ml job create \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --set "display_name=ci-smoke-test-$(Build.BuildNumber)" \
            --set "experiment_name=ci-environment-validation" \
            --set "environment=azureml:$(environmentName)@latest" \
            --set "compute=azureml:logistic12" \
            --set "command=python --version && python -c 'import sklearn,mlflow,pandera,shap,lime,evidently,optuna; print(\"All packages OK\")'" \
            --set "code=./src" \
            --query name -o tsv)

          echo "Smoke-test job: $JOB_NAME"

          # Poll until job completes (success = image built OK, fail = image broken)
          for i in $(seq 1 60); do
            STATUS=$(az ml job show \
              --name $JOB_NAME \
              --resource-group $(devRG) \
              --workspace-name $(devWS) \
              --query status -o tsv 2>/dev/null || echo "Unknown")
            echo "  [$i/60] Job status: $STATUS"

            if [ "$STATUS" = "Completed" ]; then
              echo "✅ Smoke-test passed — Docker image built and all packages importable"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Canceled" ]; then
              echo "❌ Smoke-test FAILED ($STATUS) — check environment packages"
              az ml job show --name $JOB_NAME \
                --resource-group $(devRG) --workspace-name $(devWS) \
                --query error -o json
              exit 1
            fi
            sleep 30
          done
          echo "⚠️  Timed out after 30 min"; exit 1


    - task: AzureCLI@2
      displayName: 'Validate DEV environment'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y --allow-preview true
          az ml environment show \
            --name $(environmentName) --label latest \
            --resource-group $(devRG) --workspace-name $(devWS) \
            --query "{name:name,version:version,stage:stage}" -o json

# ──────────────────────────────────────────────────────────────────
# STAGE 3: QA — manual gate then propagate
# ──────────────────────────────────────────────────────────────────
- stage: CI_QA
  displayName: '③ QA — Propagate Environment'
  dependsOn: CI_Dev
  condition: succeeded()
  jobs:
  - job: ApprovalGate_QA
    displayName: 'Manual Approval: DEV → QA'
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: |
          DEV environment "$(environmentName)" built successfully in logistic-regression-ws.
          Approve to propagate to logistic-regression-qa.
        onTimeout: 'reject'
        timeout: '1440'

  - job: CreateEnvQA
    dependsOn: ApprovalGate_QA
    condition: succeeded()
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'Create environment in QA (logistic-regression-qa)'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y --allow-preview true
          az ml environment create \
            --file config/environment.yml \
            --resource-group $(qaRG) \
            --workspace-name $(qaWS)
          az ml environment show \
            --name $(environmentName) --label latest \
            --resource-group $(qaRG) --workspace-name $(qaWS) \
            --query "{name:name,version:version,stage:stage}" -o json

# ──────────────────────────────────────────────────────────────────
# STAGE 4: PROD — manual gate then propagate
# ──────────────────────────────────────────────────────────────────
- stage: CI_Prod
  displayName: '④ PROD — Propagate Environment'
  dependsOn: CI_QA
  condition: succeeded()
  jobs:
  - job: ApprovalGate_Prod
    displayName: 'Manual Approval: QA → PROD'
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: |
          QA environment validated. Approve to propagate to logistic-regression-prod.
          WARNING: affects all PROD inference jobs.
        onTimeout: 'reject'
        timeout: '1440'

  - job: CreateEnvProd
    dependsOn: ApprovalGate_Prod
    condition: succeeded()
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'Create environment in PROD (logistic-regression-prod)'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add -n ml -y --allow-preview true
          az ml environment create \
            --file config/environment.yml \
            --resource-group $(prodRG) \
            --workspace-name $(prodWS)
          az ml environment show \
            --name $(environmentName) --label latest \
            --resource-group $(prodRG) --workspace-name $(prodWS) \
            --query "{name:name,version:version,stage:stage}" -o json

          # Audit record
          python -c "
          import json, datetime
          print(json.dumps({
            'propagated_at': datetime.datetime.utcnow().isoformat(),
            'environment': '$(environmentName)',
            'pipeline_build': '$(Build.BuildNumber)',
            'git_commit': '$(Build.SourceVersion)'
          }, indent=2))
          " > env_propagation_record.json

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'env_propagation_record.json'
        ArtifactName: 'env-propagation-audit'
      condition: always()
