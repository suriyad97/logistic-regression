trigger:
  branches:
    include:
    - master
  paths:
    include:
    - config/environment.yml
    - config/conda.yml
    - azdopipelines/ci-setup-environment.yml

pr:
  branches:
    include:
    - master
  paths:
    include:
    - config/environment.yml
    - config/conda.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ml-pipeline-vars
- name: environmentName
  value: 'titanic-logistic-regression'
- name: devRG
  value: 'ml-pipeline-rg'
- name: devWS
  value: 'logistic-regression-ws'
- name: qaRG
  value: 'ml-pipeline-rg-qa'
- name: qaWS
  value: 'logistic-regression-qa'
- name: prodRG
  value: 'ml-pipeline-rg-prod'
- name: prodWS
  value: 'logistic-regression-prod'

# =============================================================
# CI Pipeline  -  Build  ->  Push to ACR  ->  DEV  ->  QA  ->  PROD
#
# Step-by-step:
#   Stage 1 (DEV):
#     a. Register environment spec in AML DEV workspace
#     b. AML builds Docker image from conda.yml + base image
#        and pushes it to DEV ACR automatically
#     c. Wait up to 90 min for build to complete
#     d. Read the built image URI from DEV environment
#
#   Stage 2 (QA - after manual approval):
#     Register environment in QA workspace using the SAME
#     Docker image URI built in DEV.  No rebuild.
#
#   Stage 3 (PROD - after manual approval):
#     Register environment in PROD workspace using the SAME
#     Docker image URI built in DEV.  No rebuild.
# =============================================================

stages:

# ------------------------------------------------------------------
# STAGE 1  -  DEV
# Build Docker image, push to ACR, register environment
# ------------------------------------------------------------------
- stage: CI_Dev
  displayName: 'DEV - Build Docker Image and Push to ACR'
  jobs:
  - job: BuildAndPushDev
    displayName: 'Build image in DEV ACR and register in AML'
    timeoutInMinutes: 120
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Step 1 - Register environment spec in AML DEV'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          echo "Registering environment spec..."
          ENV_VERSION=$(az ml environment create \
            --file config/environment.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query version -o tsv)

          echo "Registered: $(environmentName) v$ENV_VERSION in $(devWS)"
          echo "##vso[task.setvariable variable=ENV_VERSION]$ENV_VERSION"

    - task: AzureCLI@2
      displayName: 'Step 2 - Submit job to trigger Docker image build in DEV ACR'
      timeoutInMinutes: 100
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          echo "Submitting smoke-test job to trigger Docker image build..."
          JOB_NAME=$(az ml job create \
            --file scripts/ci/smoke_test_job.yml \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query name -o tsv)

          echo "Job submitted: $JOB_NAME"
          echo "AML is now building the Docker image from conda.yml and pushing to DEV ACR."
          echo "Waiting for build + job to complete (first build takes 20-40 min)..."

          # Poll every 30s, max 90 min (180 iterations)
          for i in $(seq 1 180); do
            STATUS=$(az ml job show \
              --name $JOB_NAME \
              --resource-group $(devRG) \
              --workspace-name $(devWS) \
              --query status -o tsv 2>/dev/null || echo "Unknown")

            ELAPSED=$(( i * 30 ))
            echo "  [${i}/180] ${ELAPSED}s elapsed - Job status: $STATUS"

            if [ "$STATUS" = "Completed" ]; then
              echo "Docker image built and pushed to DEV ACR successfully."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Canceled" ]; then
              echo "Build job failed ($STATUS) - check AML logs."
              az ml job show \
                --name $JOB_NAME \
                --resource-group $(devRG) \
                --workspace-name $(devWS) \
                --query error -o json
              exit 1
            fi
            sleep 30
          done
          echo "Timed out after 90 min."; exit 1

    - task: AzureCLI@2
      displayName: 'Step 3 - Get built image URI from DEV ACR'
      name: getImageUri
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          IMAGE_URI=$(az ml environment show \
            --name $(environmentName) \
            --label latest \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query "image" -o tsv)

          echo "Built image URI: $IMAGE_URI"
          echo "##vso[task.setvariable variable=IMAGE_URI;isOutput=true]$IMAGE_URI"
          echo "##vso[task.setvariable variable=IMAGE_URI]$IMAGE_URI"

          az ml environment show \
            --name $(environmentName) \
            --label latest \
            --resource-group $(devRG) \
            --workspace-name $(devWS) \
            --query "{name:name, version:version, image:image}" -o table

# ------------------------------------------------------------------
# STAGE 2  -  QA
# Manual approval then register SAME image in QA workspace
# ------------------------------------------------------------------
- stage: CI_QA
  displayName: 'QA - Propagate Environment (no rebuild)'
  dependsOn: CI_Dev
  condition: succeeded()
  variables:
    IMAGE_URI: $[ stageDependencies.CI_Dev.BuildAndPushDev.outputs['getImageUri.IMAGE_URI'] ]
  jobs:
  - job: ApprovalGate_QA
    displayName: 'Manual Approval - Promote to QA'
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: 'Docker image built and pushed to DEV ACR. Approve to register same image in logistic-regression-qa (no rebuild).'
        onTimeout: 'reject'
        timeout: '1440'

  - job: RegisterEnvQA
    displayName: 'Register environment in logistic-regression-qa'
    dependsOn: ApprovalGate_QA
    condition: succeeded()
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'Register environment in QA workspace'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          echo "Registering environment in QA using DEV image: $(IMAGE_URI)"

          az ml environment create \
            --name $(environmentName) \
            --version $(ENV_VERSION) \
            --image "$(IMAGE_URI)" \
            --resource-group $(qaRG) \
            --workspace-name $(qaWS)

          az ml environment show \
            --name $(environmentName) \
            --label latest \
            --resource-group $(qaRG) \
            --workspace-name $(qaWS) \
            --query "{name:name, version:version, image:image}" -o table

          echo "Environment registered in QA. Same Docker image - no rebuild."

# ------------------------------------------------------------------
# STAGE 3  -  PROD
# Manual approval then register SAME image in PROD workspace
# ------------------------------------------------------------------
- stage: CI_Prod
  displayName: 'PROD - Propagate Environment (no rebuild)'
  dependsOn: CI_QA
  condition: succeeded()
  variables:
    IMAGE_URI: $[ stageDependencies.CI_Dev.BuildAndPushDev.outputs['getImageUri.IMAGE_URI'] ]
  jobs:
  - job: ApprovalGate_Prod
    displayName: 'Manual Approval - Promote to PROD'
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'suriya.divi@outlook.com'
        instructions: 'QA validated. Approve to register same image in logistic-regression-prod. WARNING: affects all PROD jobs.'
        onTimeout: 'reject'
        timeout: '1440'

  - job: RegisterEnvProd
    displayName: 'Register environment in logistic-regression-prod'
    dependsOn: ApprovalGate_Prod
    condition: succeeded()
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: 'Register environment in PROD workspace'
      inputs:
        azureSubscription: 'Azure ML Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          az extension add -n ml -y --allow-preview true

          echo "Registering environment in PROD using DEV image: $(IMAGE_URI)"

          az ml environment create \
            --name $(environmentName) \
            --version $(ENV_VERSION) \
            --image "$(IMAGE_URI)" \
            --resource-group $(prodRG) \
            --workspace-name $(prodWS)

          az ml environment show \
            --name $(environmentName) \
            --label latest \
            --resource-group $(prodRG) \
            --workspace-name $(prodWS) \
            --query "{name:name, version:version, image:image}" -o table

          python3 -c "import json,datetime; print(json.dumps({'promoted_at': datetime.datetime.utcnow().isoformat(), 'image': '$(IMAGE_URI)', 'build': '$(Build.BuildNumber)', 'commit': '$(Build.SourceVersion)'}, indent=2))" > env_audit.json

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'env_audit.json'
        ArtifactName: 'environment-audit'
      condition: always()
