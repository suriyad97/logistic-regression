version: '3.8'

services:

  # ── FastAPI inference server ─────────────────────────────────────
  model-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titanic-ml-api
    ports:
      - "8000:8000"        # FastAPI / uvicorn port
    volumes:
      - ./model:/model     # trained model artifacts
      - ./logs:/app/logs
    environment:
      - MODEL_PATH=/model/model.pkl
      - PREPROCESSOR_PATH=/model/preprocessor.pkl
      - PORT=8000
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s    # extra time for model load
    networks:
      - ml-network
    restart: unless-stopped
    # Docs available at:
    #   http://localhost:8000/docs    ← Swagger UI
    #   http://localhost:8000/redoc   ← ReDoc

  # ── Local MLflow tracking server ─────────────────────────────────
  # (used only for local development — production uses AML tracking)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.0
    container_name: mlflow-server
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/root/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri file:/root/mlflow
    networks:
      - ml-network
    restart: unless-stopped

networks:
  ml-network:
    driver: bridge

volumes:
  logs:
