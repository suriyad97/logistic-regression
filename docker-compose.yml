version: '3.8'

services:
  model-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titanic-ml-api
    ports:
      - "5000:5000"
    volumes:
      - ./model:/model
      - ./logs:/app/logs
    environment:
      - MODEL_PATH=/model/model.pkl
      - PREPROCESSOR_PATH=/model/preprocessor.pkl
      - PORT=5000
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - ml-network
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.0
    container_name: mlflow-server
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow_data:/root/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri file:/root/mlflow
    networks:
      - ml-network
    restart: unless-stopped

networks:
  ml-network:
    driver: bridge

volumes:
  model:
  logs:
  mlflow_data:
